  # ========== Phase 2: 综合（依赖 t1-t10 全部完成） ==========

  - id: t11-synthesize
    title: 综合所有调研产出迭代方案
    prompt: |
      综合 t1-t10 共 10 份调研报告，产出针对 `/Users/huojin/Desktop/有偿文章阅读/` 项目的**迭代方案**。

      **必读文件**：
      - `/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t1-products.md`
      - `t2-payment.md` ~ `t10-ai.md`（共 9 份）
      - 项目源码：`/Users/huojin/Desktop/有偿文章阅读/server/src/**` 和 `/Users/huojin/Desktop/有偿文章阅读/web/**`
      - 现有方案文档：`/Users/huojin/Desktop/有偿文章阅读/docs/实施方案.md`

      **迭代方案结构**：

      1. **现状总结**（基于源码分析）
         - 当前架构
         - 现有功能
         - 当前短板

      2. **调研关键发现**（10 份报告的精炼，每份 3-5 条最关键结论）

      3. **迭代路线图**（按优先级排序）
         - **P0（必须做，本周）**：紧急改进
         - **P1（建议做，本月）**：体验优化
         - **P2（规划做，季度）**：功能扩展
         - **P3（观望）**：待技术成熟再做

      每个迭代项必须包含：
      - **问题**：当前痛点（引用调研依据 + 现有代码定位）
      - **方案**：具体怎么改（代码级别，不是 PPT）
