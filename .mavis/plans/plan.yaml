      2. **真实性**：至少有 2 个案例能追溯到具体作者/平台（不是虚构或泛指）
      3. **数据真实性**：收入/订阅数是否有来源支撑（不要拍脑袋数字）
      4. **启发性**：是否给出对"日 < 50 元小作者"的具体启发

      **PASS/FAIL**
    max_retries: 2

  - id: t9-trends
