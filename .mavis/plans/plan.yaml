      **每个主题输出**：
      - 3-5 个具体设计建议
      - 真实截图或案例（URL 即可）
      - 转化率 / 用户体验数据（如有）
      - 对**当前项目**（原生 JS SPA、无第三方 UI 库）的具体建议

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t7-ux.md`
      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t7-ux.md`：
      1. **数量**：≥4 个 UX 主题
      2. **具体性**：是否给出可落地的设计建议，不是"重视用户体验"这种空话
      3. **针对性**：对当前"原生 JS 单文件 SPA"的具体建议（不是 React/Vue 栈的）
      4. **数据支撑**：至少有 1 个数据点（转化率 / 加载性能）

      **PASS/FAIL**
    max_retries: 2

  - id: t8-cases
    title: 调研真实小作者付费案例
    prompt: |
      调研真实运营的个人付费阅读案例（成功/失败都要），时间基准 2026-06-21。

      **必查清单（至少 4 个）**：
      1. 国内：小报童头部作者（如"半佛仙人"相关 newsletter 模式）
      2. 国外：Substack 头部小作者案例（如 Casey Newton / Platformer）
      3. Telegram Channel 付费订阅（典型小作者）
      4. Discord 付费社群（小作者运营）
      5. 知识星球头部 + 尾部作者的运营数据
      6. 失败案例（为什么有些 newsletter 做不起来）

      **每个案例输出**：
      - 作者名 + 平台
      - 定价 + 订阅人数 / 月收入
      - 运营关键动作
      - 至少 1 个来源 URL（推特 / 博客 / 公开访谈 / 第三方数据）
      - 对**当前项目**（用户单日 < 50 元、个人收款码）的启发

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t8-cases.md`
