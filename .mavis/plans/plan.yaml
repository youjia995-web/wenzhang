version: 1
plan:
  name: '个人文章付费阅读项目行业调研 + 迭代方案'
  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  # ========== Phase 1: 10 个并发调研任务（每任务 3-4 个内容，目标 30+ 素材） ==========

  - id: t1-products
    title: 调研典型付费阅读产品（国内外）
    prompt: |
      调研"个人文章付费阅读 / 知识付费"领域的典型产品，时间基准 2026-06-21。

      **必查产品清单（至少 6 个）**：
      1. Substack（国外 newsletter 付费标杆）
      2. Patreon（创作者订阅）
      3. Buy Me a Coffee（小额打赏）
      4. Lemnos / Ghost Members（独立 newsletter）
      5. 知识星球（国内付费社群）
      6. 小报童（公众号生态 newsletter）
      7. 得到 App（国内知识付费）
      8. 虎嗅 / 36kr 付费会员（媒体付费墙）

      **每个产品输出**：
      - 基本信息（成立时间、规模、收费模式、目标用户）
      - 单作者 vs 平台分成比例
      - 内容保护机制（防爬、防盗用）
      - 支付链路（个人收款码 vs 平台代收 vs 商业收款）
      - 至少 1 个公开可验证的来源 URL（官网/新闻/财报/技术博客）
      - 对**当前项目**（`/Users/huojin/Desktop/有偿文章阅读`，个人收款码 + Fastify + Prisma 的极简 MVP）的具体借鉴点（≥3 条）

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t1-products.md`
      **输出格式**：每个产品一个 H2 章节，最后一节"对当前项目借鉴总结"。

      **时间预算**：15 分钟内完成。优先用 web_search + webfetch 获取公开信息。
      **完成条件**：文件已写入且包含 ≥6 个产品的完整信息。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      独立审核 `/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t1-products.md`：
      1. **数量验证**：是否真的覆盖 ≥6 个产品？逐个列出
      2. **真实性验证**：随机抽 2 个产品，对照其官网/公开资料核对至少 3 个关键事实（成立时间/规模/收费模式）。**有任何一个错的直接 FAIL**
      3. **借鉴价值验证**："对当前项目借鉴"部分是否真的针对 `/Users/huojin/Desktop/有偿文章阅读` 这个具体项目（个人收款码 + Fastify + Prisma），不是泛泛而谈
      4. **来源验证**：每个产品至少有 1 个 URL，URL 是否真实可访问（用 webfetch 抽查 2 个）

      **PASS/FAIL 标注**：每个产品都标可信度（高/中/低），最后给整体 PASS/FAIL
    max_retries: 2

  - id: t2-payment
    title: 调研个人/小作者支付方案
    prompt: |
      调研个人创作者可用的支付方案，时间基准 2026-06-21。重点关注**非商户号方案**（用户场景就是只用个人收款码）。

      **必查清单（至少 4 个）**：
      1. 微信收款码 + 手动确认（用户当前方案）
      2. 支付宝收款码 + 手动确认
      3. 虎皮兰支付 / YunGouOS（个人微信/支付宝免签聚合）
      4. Payjs / Zpay / 虎皮兰（个人小程序支付聚合）
      5. Stripe Atlas / Lemon Squeezy（海外个人创作者收款）
      6. Wise / 派安盈（个人跨境收款）

      **每个方案输出**：
      - 接入门槛（是否需要营业执照/商户号）
      - 费率与到账时间
      - 风险点（封号风险 / 合规风险 / 资金安全）
      - 至少 1 个公开来源 URL（官网 / 评测 / 案例）
      - 对**当前项目**的具体建议（保留/替换/补充）

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t2-payment.md`
      **输出格式**：每个方案一个 H2 章节，最后一节"当前项目支付方案评估"（保留 / 改进 / 增加）。

      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t2-payment.md`：
      1. **数量**：≥4 个支付方案
      2. **真实性**：随机抽 2 个方案验证费率/接入门槛
      3. **针对性**：是否真的针对"个人收款码"这种 0 商户号场景，而不是泛泛而谈
      4. **风险维度**：是否覆盖了合规/封号风险（这是用户最关心的）

      **PASS/FAIL** + 每个方案可信度评级
    max_retries: 2

  - id: t3-content-protection
    title: 调研付费内容保护技术
    prompt: |
      调研付费阅读内容保护技术（防白嫖、防爬、防盗用），时间基准 2026-06-21。

      **必查清单（至少 4 个）**：
      1. 服务端鉴权 + 解锁 token（用户当前方案）
      2. 客户端 JS 解密（Substack/Ghost 用过，被破解过）
      3. 浏览器指纹 + 设备绑定（防 token 共享）
      4. 截图水印 / 动态签名（视觉追溯）
      5. PDF 导出限制 / 复制限制（交互层防护）
      6. 视频/音频内容 DRM（进阶场景）

      **每个技术输出**：
      - 工作原理（1-2 段）
      - 攻击场景（怎么被破解的，真实案例）
      - 实施成本（开发量 / 用户体验损耗）
      - 至少 1 个来源 URL
      - 对**当前项目**（Fastify + Prisma + Node.js）的可实施性

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t3-content-protection.md`
      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t3-content-protection.md`：
      1. **数量**：≥4 个保护技术
      2. **真实性**：至少有 1 个真实案例（Substack 被破解 / 某站被爬虫攻破等）
      3. **针对性**：对当前 Node.js + Prisma 栈的具体实施建议，不是泛泛而谈
      4. **可实施性**：给出的建议是 1 天内可落地还是 1 个月

      **PASS/FAIL** + 每个技术可信度
    max_retries: 2

  - id: t4-tech-architecture
    title: 调研小作者付费站技术架构
    prompt: |
      调研适合个人/小团队的付费内容站技术架构，时间基准 2026-06-21。

      **必查清单（至少 4 个）**：
      1. Ghost + Ghost Members（开箱即用，集成 Stripe）
      2. Hashnode（技术博客 + 付费）
      3. WordPress + Memberpress / Restrict Content Pro
      4. Astro / Next.js + Edge Functions（自建）
      5. Lemmy / WriteFreely（自托管）
      6. Serverless + Stripe Checkout（Vercel + Cloudflare）

      **每个方案输出**：
      - 技术栈（前端 / 后端 / DB / 部署）
      - 自定义空间（能不能改解锁逻辑 / 加自己的支付）
      - 学习成本
      - 适合的人群（纯写作 / 半技术 / 全栈）
      - 至少 1 个来源 URL
      - 对**当前项目**（Node.js + Fastify + Prisma + Zeabur 单服务）的对比

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t4-tech-architecture.md`
      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t4-tech-architecture.md`：
      1. **数量**：≥4 个技术方案
      2. **真实性**：至少 2 个有 GitHub 仓库或官网可访问
      3. **针对性**：是否针对"个人作者"（不是企业级 SaaS）
      4. **对比性**：是否真的和当前 Fastify 栈做了对比

      **PASS/FAIL**
    max_retries: 2

  - id: t5-growth
    title: 调研小作者运营增长策略
    prompt: |
      调研小作者付费内容的运营增长策略，时间基准 2026-06-21。

      **必查清单（至少 4 个）**：
      1. SEO 流量获取（Google + 必应中文 SEO）
      2. 邮件订阅 + drip 推送（Mailchimp / Buttondown / Resend）
      3. 会员制 vs 单篇制 vs 阶梯定价（pricing strategy）
      4. Twitter / X / 公众号 私域引流
      5. SEO 友好的文章结构（结构化数据 / sitemap / canonical）
      6. 复购模型（如何让读者买第二次）

      **每个策略输出**：
      - 具体方法（≥3 条可操作建议）
      - 真实案例（某个小作者怎么从 0 到 X 收入）
      - 来源 URL
      - 对**当前项目**的具体改进点

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t5-growth.md`
      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t5-growth.md`：
      1. **数量**：≥4 个增长策略
      2. **真实性**：至少 1 个真实小作者案例（具体数字）
      3. **可操作性**：建议是 24 小时内可执行，不是"做内容"这种空话
      4. **针对性**：针对日收入 < 50 元的小作者，不是大 V

      **PASS/FAIL**
    max_retries: 2

  - id: t6-compliance
    title: 调研个人收款合规与税务
    prompt: |
      调研个人收款码做内容付费的合规与税务风险，时间基准 2026-06-21。

      **必查清单（至少 3 个）**：
      1. 微信支付商户号申请条件（个体户 / 有限公司 / 个人身份证的限制）
      2. 个人收款码收款的合规风险（央行 2022 年 10 月新规、对个人码收款的限制）
      3. 个人收入税务申报（劳务报酬 / 经营所得 / 增值税起征点）
      4. 反洗钱 / 平台冻结 / 资金追溯风险
      5. 海外用户收款（外汇管理 / 跨境支付）

      **每个主题输出**：
      - 现行规则（2026-06 截止的最新政策）
      - 真实案例（有人被冻结/补税的具体例子）
      - 至少 1 个来源 URL（政策原文 / 官方公告 / 媒体报道）
      - 对**当前项目**（单日 < 50 元、只用个人收款码）的具体风险评估与建议

      **写入文件**：`/Users/huojin/Desktop/有偿文章阅读/.mavis/plans/research/t6-compliance.md`
      **时间预算**：15 分钟内完成。
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      审核 `t6-compliance.md`：
      1. **数量**：≥3 个合规/税务主题
      2. **时效性**：政策引用是否在 2024 年后（不要用过时的）
      3. **真实性**：央行/税务公告是否能追溯到原文
      4. **针对性**：是否针对"日 < 50 元小作者"这种具体场景，不是泛泛而谈

      **PASS/FAIL**
    max_retries: 2

  - id: t7-ux
    title: 调研付费阅读 UX 优秀实践
    prompt: |
      调研付费阅读产品的优秀 UX 设计，时间基准 2026-06-21。

      **必查清单（至少 4 个）**：
      1. 优秀支付页设计（Stripe Checkout / Substack 付费墙 / 小报童付费卡）
      2. 移动端 vs PC 端体验差异
      3. 解锁后体验（如何让读者"觉得这钱花得值"）
      4. 加载性能对转化率的影响（LCP / FID 优化）
      5. 预览策略（前 20% / 30% / 三段式）
